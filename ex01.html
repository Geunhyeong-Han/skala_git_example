<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        ul.nav {
            border: 1px solid red;
            list-style: none;
            padding: 0px;
            width: 1000px;
            /* height: 40px; */
            overflow: hidden;
        }
        .nav li {
            border: 1px dashed green;
            padding: 0px;
            width: 200px;
            height: 100px;
            float: left;
            box-sizing: border-box;
            font-size: 18pt;
            text-align: center;
            line-height: 100px;
        }
        .nav li:hover {
            background-color: red;
        }
    </style>
</head>
<body>
    <h1>Hello world</h1>
    <ul class="nav">
        <li>HOME</li>
        <li>PROFILE</li>
        <li>GALLERY</li>
        <li>BOARD</li>
        <li>CONTACT</li>
    </ul>
</body>
</html>
